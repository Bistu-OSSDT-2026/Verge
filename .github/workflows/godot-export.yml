# Godot 项目自动导出
# 每次 push 到 master 时自动导出 Windows/Linux/Web 版本
# 需要先在 GitHub Secrets 中配置 GODOT_VERSION（可选，默认 4.2.1）

name: Godot 自动导出

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'  # 打版本 tag 时触发
  workflow_dispatch:  # 允许手动触发

jobs:
  export:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [windows, linux, web]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 Godot
        run: |
          GODOT_VERSION="4.2.1"
          echo "使用 Godot $GODOT_VERSION"

          if [ "${{ matrix.platform }}" == "web" ]; then
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
            unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
            # Web 导出需要额外模板
            mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
            unzip -q "Godot_v${GODOT_VERSION}-stable_export_templates.tpz" -d ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          else
            wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
            unzip -q "Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          fi

          chmod +x Godot_v${GODOT_VERSION}-stable_linux.x86_64
          sudo mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 /usr/local/bin/godot

      - name: 验证 Godot
        run: godot --version

      - name: 创建导出目录
        run: mkdir -p export

      - name: 导出项目 (Windows)
        if: matrix.platform == 'windows'
        run: |
          godot --headless --export-release "Windows Desktop" export/Verge.exe || \
          echo "⚠️ 导出 Windows 版本失败，请检查 export_presets.cfg"

      - name: 导出项目 (Linux)
        if: matrix.platform == 'linux'
        run: |
          godot --headless --export-release "Linux/X11" export/Verge.x86_64 || \
          echo "⚠️ 导出 Linux 版本失败，请检查 export_presets.cfg"

      - name: 导出项目 (Web)
        if: matrix.platform == 'web'
        run: |
          godot --headless --export-release "Web" export/web/ || \
          echo "⚠️ 导出 Web 版本失败，请检查 export_presets.cfg"

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Verge-${{ matrix.platform }}
          path: export/

  # 仅在打 tag 时自动创建 Release
  release:
    needs: export
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 打包产物
        run: |
          cd artifacts
          for dir in Verge-*; do
            zip -r "../$dir.zip" "$dir"
          done

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
